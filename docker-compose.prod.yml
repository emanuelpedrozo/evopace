services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: evopace-api
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${EVOPACE_API_PORT:-3334}:3334"

  postgres:
    image: postgres:16-alpine
    container_name: evopace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evopace}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - evopace_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-evopace}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  evopace_postgres:
